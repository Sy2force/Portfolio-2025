services:
  # Backend API service
  - type: web
    name: portfolio-backend
    env: node
    region: oregon
    plan: free
    buildCommand: cd backend && npm install && npm run build
    startCommand: cd backend && npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 18
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      # Add these in Render dashboard:
      # - MONGODB_URI
      # - JWT_SECRET
      # - JWT_REFRESH_SECRET
      # - REDIS_URL
      # - SMTP_HOST
      # - SMTP_PORT
      # - SMTP_USER
      # - SMTP_PASS
      # - CLIENT_URL

databases:
  - name: portfolio-mongodb
    databaseName: portfolio
    user: portfolio
